name: Deploy RSVP Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:  # allow manual trigger from Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      FUNCTION_NAME: halloween-2027-rsvps
      TABLE_NAME: halloween-2027-rsvps
      ADMIN_KEY: darkmask2027
      ROLE_NAME: halloween-2027-lambda-role
      API_NAME: halloween-2027-api

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Create DynamoDB table (if not exists)
        run: |
          aws dynamodb create-table \
            --table-name $TABLE_NAME \
            --attribute-definitions \
              AttributeName=id,AttributeType=S \
              AttributeName=email,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --global-secondary-indexes '[
              {
                "IndexName": "email-index",
                "KeySchema": [{"AttributeName": "email","KeyType": "HASH"}],
                "Projection": {"ProjectionType": "ALL"}
              }
            ]' 2>/dev/null \
            && echo "Table created" \
            || echo "Table already exists"

      - name: Create IAM role (if not exists)
        id: role
        run: |
          TRUST='{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'
          ROLE_ARN=$(aws iam create-role \
            --role-name $ROLE_NAME \
            --assume-role-policy-document "$TRUST" \
            --query 'Role.Arn' --output text 2>/dev/null \
            || aws iam get-role --role-name $ROLE_NAME --query 'Role.Arn' --output text)
          aws iam attach-role-policy --role-name $ROLE_NAME \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole 2>/dev/null || true
          aws iam attach-role-policy --role-name $ROLE_NAME \
            --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess 2>/dev/null || true
          echo "role_arn=$ROLE_ARN" >> $GITHUB_OUTPUT
          echo "Role: $ROLE_ARN"
          sleep 8  # wait for role propagation

      - name: Package Lambda
        run: |
          cd backend
          zip lambda.zip lambda_function.py

      - name: Deploy Lambda function
        id: lambda
        run: |
          ROLE_ARN="${{ steps.role.outputs.role_arn }}"
          LAMBDA_ARN=$(aws lambda create-function \
            --function-name $FUNCTION_NAME \
            --runtime python3.12 \
            --role "$ROLE_ARN" \
            --handler lambda_function.handler \
            --zip-file fileb://backend/lambda.zip \
            --timeout 15 \
            --environment "Variables={TABLE_NAME=$TABLE_NAME,ADMIN_KEY=$ADMIN_KEY}" \
            --query 'FunctionArn' --output text 2>/dev/null \
            || (aws lambda update-function-code \
              --function-name $FUNCTION_NAME \
              --zip-file fileb://backend/lambda.zip \
              --query 'FunctionArn' --output text \
            && aws lambda update-function-configuration \
              --function-name $FUNCTION_NAME \
              --environment "Variables={TABLE_NAME=$TABLE_NAME,ADMIN_KEY=$ADMIN_KEY}" \
              --query 'FunctionArn' --output text))
          echo "lambda_arn=$LAMBDA_ARN" >> $GITHUB_OUTPUT
          echo "Lambda: $LAMBDA_ARN"

      - name: Create API Gateway (if not exists)
        id: api
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LAMBDA_ARN="${{ steps.lambda.outputs.lambda_arn }}"

          API_ID=$(aws apigatewayv2 get-apis \
            --query "Items[?Name=='$API_NAME'].ApiId | [0]" --output text)

          if [ "$API_ID" = "None" ] || [ -z "$API_ID" ]; then
            API_ID=$(aws apigatewayv2 create-api \
              --name $API_NAME \
              --protocol-type HTTP \
              --cors-configuration 'AllowOrigins=["*"],AllowMethods=["GET","POST","OPTIONS"],AllowHeaders=["Content-Type"]' \
              --query 'ApiId' --output text)
            echo "Created API: $API_ID"

            INTEGRATION_ID=$(aws apigatewayv2 create-integration \
              --api-id $API_ID \
              --integration-type AWS_PROXY \
              --integration-uri $LAMBDA_ARN \
              --payload-format-version 2.0 \
              --query 'IntegrationId' --output text)

            for METHOD in GET POST OPTIONS; do
              aws apigatewayv2 create-route \
                --api-id $API_ID \
                --route-key "$METHOD /rsvps" \
                --target "integrations/$INTEGRATION_ID" > /dev/null
            done

            aws apigatewayv2 create-stage \
              --api-id $API_ID \
              --stage-name '$default' \
              --auto-deploy > /dev/null

            aws lambda add-permission \
              --function-name $FUNCTION_NAME \
              --statement-id apigateway-invoke \
              --action lambda:InvokeFunction \
              --principal apigateway.amazonaws.com \
              --source-arn "arn:aws:execute-api:us-east-1:${ACCOUNT_ID}:${API_ID}/*/*/rsvps" > /dev/null 2>&1 || true
          else
            echo "API already exists: $API_ID"
          fi

          ENDPOINT="https://${API_ID}.execute-api.us-east-1.amazonaws.com/rsvps"
          echo "api_id=$API_ID" >> $GITHUB_OUTPUT
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "✅ Endpoint: $ENDPOINT"

      - name: Summary
        run: |
          echo "## 🎃 RSVP Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Endpoint:** \`${{ steps.api.outputs.endpoint }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Admin key:** \`${{ env.ADMIN_KEY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Read all RSVPs:** \`curl '${{ steps.api.outputs.endpoint }}?key=${{ env.ADMIN_KEY }}'\`" >> $GITHUB_STEP_SUMMARY
